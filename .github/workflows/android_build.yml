name: Gerar APK GearHub Profissional

on:
  push:
    branches: ["main"]

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar Dependências
        run: |
          npm install
          # Instala a ferramenta que gera os ícones automaticamente
          npm install @capacitor/assets --save-dev

      - name: Build do Projeto (Vite)
        run: npm run build

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Configurar Capacitor e Android
        run: |
          # Inicializa a config garantindo o diretório 'dist'
          npx cap init GearHub com.gearhub.app --web-dir dist
          npx cap add android || true
          
          # COMANDO MÁGICO: Pega a imagem de resources/icon.png e cria os ícones
          # Se der erro aqui, o build continua para não travar
          npx capacitor-assets generate --android || echo "Ícone não encontrado, usando padrão"
          
          # Sincroniza os arquivos do Vite (dist) para dentro do Android
          npx cap sync android

      - name: Compilar APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Download do APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: GearHub-V1-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk