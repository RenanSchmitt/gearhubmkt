name: Gerar APK GearHub

on:
  push:
    branches: ["main"]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar e Buildar Web
        run: |
          npm install
          npm run build

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Preparar Android
        run: |
          # Adiciona a plataforma apenas se necessário e sincroniza os arquivos do Vite
          npx cap add android || true
          npx cap sync android

      - name: Compilar APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: gearhub-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk