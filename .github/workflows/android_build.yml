name: Gerar APK GearHub

on:
  push:
    branches: ["main"]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build do Projeto (Vite)
        run: npm run build

      - name: Configurar Java (Necessário para Android)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Adicionar Plataforma Android Capacitor
        run: npx cap add android

      - name: Sincronizar código com Android
        run: npx cap copy

      - name: Compilar APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload do APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: gearhub-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk