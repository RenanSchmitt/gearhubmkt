name: Gerar APK GearHub

on:
  push:
    branches: ["main"]

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Instalar e Buildar Web
        run: |
          npm install
          npm run build

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21' # Atualizado de 17 para 21

      - name: Inicializar e Sincronizar Capacitor
        run: |
          npx cap init GearHub com.gearhub.app --web-dir dist
          npx cap add android || true
          npx cap sync android

      - name: Compilar APK (Gradle)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK
        uses: actions/upload-artifact@v4
        with:
          name: gearhub-github-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk